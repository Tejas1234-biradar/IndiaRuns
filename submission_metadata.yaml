ai_usage_summary: |
  Used GitHub Copilot, Cursor, and OpenCode for coding assistance, debugging,
  refactoring, and architecture iteration. The final ranking pipeline performs
  no external API calls during inference. Runtime ranking executes locally in a
  constrained CPU-only environment using precomputed artifacts and deterministic
  model-based reasoning.

methodology_summary: |
  Two-phase candidate ranking system.

  Offline phase: decode and structure the JD, build semantic candidate embeddings and a FAISS index,
  engineer tabular behavioral/profile features, detect honeypots, and train an XGBoost ranker on
  teacher-labeled relevance scores.

  Runtime phase: load precomputed artifacts, purge honeypots, retrieve a top semantic slice with
  FAISS, load only the selected tabular feature rows, score candidates with the XGBoost student
  ranker, and generate deterministic SHAP-based reasoning for the final ranked output. The verified
  local end-to-end `rank.py` runtime on the current environment was approximately 0.43 seconds for
  the full submission flow, and the project also includes a lightweight Streamlit sandbox for
  manual inspection on candidate slices up to 100 rows.

